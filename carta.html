  <title>Cartita para Clau 💌</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .carta-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      align-items: center;
    }

  height: 720px;
  position: relative;
  overflow: hidden;
  border-radius: 25px;
  background: rgba(255,255,255,0.12);
  display: flex;
  justify-content: center;
  align-items: center;
}
    #canvasRamo {
      width: 100%;
      height: 100%;
      display: block;
    }

    #msgRamo {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font: 22px Arial;
      text-shadow: 0 0 12px white;
      opacity: 0;
      transition: 2s;
    }

    @media (max-width: 800px) {
      .carta-layout {
        grid-template-columns: 1fr;
      }

      .ramo-box {
        height: 500px;
      }
    }
  </style>
</head>

    </div>
  </div>

    const lineHeight = 9;
    ctx.font = `${fontSize}px monospace`;

    const chars = "⢀⣀⣶⣿⡇⣧⢿⠿⣤⣦⡀⡄⠈⠉⠒⠷⢦⣄⡿⣾⣿⣿";
    const particles = [];

    const lines = ramo.trim().split("\n");
    const maxLen = Math.max(...lines.map(l => l.length));
    
const dibujoWidth = maxLen * fontSize * 0.55;
const dibujoHeight = lines.length * lineHeight;

const startX = (canvas.width - dibujoWidth) / 2;
const startY = (canvas.height - dibujoHeight) / 2;

    lines.forEach((line, y) => {
      [...line].forEach((char, x) => {
        if (char !== " " && char !== "⠀") {
          particles.push({
            x: startX + x * fontSize * 0.55,
            y: -Math.random() * canvas.height,
            tx: startX + x * fontSize * 0.55,
            ty: startY + y * lineHeight,
            char: chars[Math.floor(Math.random() * chars.length)],
            final: char,
            speed: 2 + Math.random() * 4,
            form: false
          });
        }
      });
    });

    setTimeout(() => {
      particles.forEach(p => p.form = true);
    }, 2500);

    setTimeout(() => {
      document.getElementById("msgRamo").style.opacity = 1;
    }, 6000);

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        if (!p.form) {
          p.y += p.speed;
          if (p.y > canvas.height) p.y = -20;
          if (Math.random() < 0.1) {
            p.char = chars[Math.floor(Math.random() * chars.length)];
          }
        } else {
          p.x += (p.tx - p.x) * 0.055;
          p.y += (p.ty - p.y) * 0.055;

          if (Math.abs(p.x - p.tx) < 1 && Math.abs(p.y - p.ty) < 1) {
            p.char = p.final;
          }
        }

        ctx.fillStyle = "white";
        ctx.shadowColor = "white";
        ctx.shadowBlur = 7;
        ctx.font = `${fontSize}px monospace`;
        ctx.fillText(p.char, p.x, p.y);
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
