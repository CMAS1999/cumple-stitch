<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encuentra a Stitch 🛸</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card">
    <h1>Encuentra a Stitch 🛸</h1>

    <p>
      Mira bien dónde está Stitch... luego los cubitos se mezclarán 👀
    </p>

    <button onclick="iniciarJuego()">Empezar mezcla 🎲</button>

    <div class="cubos" id="cubos"></div>

    <div id="mensajeJuego" class="message-box hidden"></div>
  </div>
</div>

<script src="script.js"></script>

<script>
  const personajes = [
    { nombre: "snoopy", texto: "🐶", mensaje: "Nopis, encontraste a Snoopy xd 🐶" },
    { nombre: "minnie", texto: "🎀", mensaje: "Nopis, encontraste a Minnie 🎀" },
    { nombre: "stitch", texto: '<img src="stitch.png" class="stitch-img">', mensaje: "¡Lo encontraste! 🎉 Era Stitch 💙🛸" },
    { nombre: "nadota", texto: "NADOTA", mensaje: "NADOTA 😂 Ese no era xd" }
  ];

  let orden = [...personajes];
  let puedeElegir = false;

  function mostrarCubos(mostrarContenido = true) {
    const contenedor = document.getElementById("cubos");
    contenedor.innerHTML = "";

    orden.forEach((item, index) => {
      const cubo = document.createElement("button");
      cubo.className = "cubo mezclando";
      cubo.onclick = () => elegir(index);

      if (mostrarContenido) {
        cubo.innerHTML = item.texto;
      } else {
        cubo.innerHTML = "🎁";
      }

      contenedor.appendChild(cubo);
    });
  }

  function iniciarJuego() {
    puedeElegir = false;
    document.getElementById("mensajeJuego").classList.add("hidden");

    orden = [...personajes];
    mostrarCubos(true);

    setTimeout(() => {
      mostrarCubos(false);
      mezclarCubos(5);
    }, 1800);
  }

  function mezclarCubos(veces) {
    if (veces === 0) {
      puedeElegir = true;
      document.getElementById("mensajeJuego").innerHTML =
        "Ahora sí... ¿dónde quedó Stitch? 👀";
      document.getElementById("mensajeJuego").classList.remove("hidden");
      return;
    }

    orden.sort(() => Math.random() - 0.5);
    mostrarCubos(false);

    setTimeout(() => {
      mezclarCubos(veces - 1);
    }, 700);
  }

  function elegir(index) {
    if (!puedeElegir) {
      alert("Espera que terminen de mezclarse, joven hambreado xd 😂");
      return;
    }

    const elegido = orden[index];
    const mensaje = document.getElementById("mensajeJuego");

    mostrarCubos(true);

    mensaje.innerHTML = elegido.mensaje;
    mensaje.classList.remove("hidden");

    if (elegido.nombre === "stitch") {
      localStorage.setItem("stitchCompletado", "true");
      crearConfeti();

      setTimeout(() => {
        window.location.href = "chisme.html";
      }, 1800);
    } else {
      setTimeout(() => {
        mensaje.innerHTML = "Otra vez, Clau 👀 Mira bien a Stitch 💙";
        iniciarJuego();
      }, 1800);
    }
  }

  mostrarCubos(true);
</script>

</body>
</html>
