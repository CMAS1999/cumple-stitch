      </p>

  </div>
`;

crearConfeti();
iniciarRamoFinal();
    } else {
      caja.innerHTML = `

      `;
    }
function reiniciar() {
  localStorage.clear();
  window.location.href = "index.html";
}

в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҖв Җв ҖвЈҖвЎҖв Җвў вЎҮв Җв Җвўёв Җв Җв Җвўёв ҒвЎңв ёв Җв Җв Җв ҖвўёвЎ в Ҡв Җв Җв Җв Җв Җв ҖвўҖвЈҖвЈҖв Җв ҷвЎ„в Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈ”вЎүв ҙв ҶвЈ вЎӨвЈҲв ‘вўәв Җв Җв ҖвўҲвЎҖв Җв ҖвЎҳв ҖвЎҮвЎ„в Җв Җв Җв Җвўёв Җв Җв Җв ҖвЈҖвЈ”в ®в қв ’в Ҡв үв ӣвўівЎғв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җвў в ғв Җв Җв Җв °вЈҸвў»в Ӣв ҫвЎҶв Җв Җв №вЈҢвўўвЈёвЈҸвЎҶвЎҮвЎҮв Җв Җв Җв ҖвЎҢв ҖвўҖвЈҙвЎӘв Ӣв Ғв ҖвўҖв Өв ’в үвЎЎв „в ҡв ’вЈҶ
в Җв Җв Җв Җв Җв Җв ҖвЈ в Ҹв ’в ’в  вўӨвЈҖв Ҳв ҡвў§вЈ„вўЈв ҖвўҖвЈҖв Ҳвў»вЎғв ҳвЎҮвЈҮв Үв Җв Җв Җвў в ғв ҖвЎ©в Ӣв Җв ҖвЎ в ҡв Ғв ҖвЈ в ҡв ўв Өв Өв ’в Ғ
в Җв Җв Җвў°вЎІвЈ’в Ҳв ‘в ’в Ӯв Өв „вў в ӨвЈҚв ’в ӨвЎҷвўҝвЈҶв ҳвЎҢв үвЈ·вў»вЎҖвЈҝв ёв Ғв Җв Җв ҖвЎҢвўҖв һв Җв ҖвўҖв Һв Җв ҖвўҖв һв Ғв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв үв ’в ·вўҶв Җв Җв Җв Җв Җв “в ¶в өвўӨвЈҲвЎ‘в қвў·вЈҪвЎ„вўҝвЈҹвЈ·вў»в Җв Җв ҖвЎ в ҺвЈҖв ¬в Өв Өвў„вЎҖв ҖвўҖвЎҙв ғв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв ‘вЈӨвЎ в ”в ’вЈ’вЈҖвЎ’в ’вўҸвЈ»вЈ·вЈҰвЈҪвЈҝвЈҺвўҝвЎқвЈҝвЈ§в ҖвЎңвЎөв Ӣв Җв Җв Җв Җв Җв Ҳв ҷвўҚв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв ҖвўҖв Өв ’вўүвЎЎв ”в ҡв үв Ғв Җв Җв Җв Ҳв үв ҷв Җв үв ӣв ҝвЈҝвЈ§вЈҝвЈңвЈҝвЈҰвЎҝв Җв Җв Җв Җв Җв Җв Җв Җв Җв Ҳвў§в Җв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв ҖвўҖв –в ҒвЈ в ”в үв Җв Җв Җв ҖвЎ в „в җвЈ’вЎӨв ¬в ӯв үв үв Өв ҙв ®вЈҝвЈҝвЈҝвЈҝвЎҝвЈҮвЈӨвЈ„вЈҖвЈҖв Җв Җв  в Өв „в Җвўёв Җв Җв Җв Җв Җв Җв Җв Җв Җ
в ҖвЎ°в ҒвўҖв –в Ғв Җв Җв Җв ҖвўҖвЎ в ”в Ҡв үв Җв Җв ҖвўҖвЈҖв Өв җв ’в Ӯвў°в Ҹв “в “вў»вў»в Ӣв ҘвЈ’в ӨвЈүв Ғв ’в ӨвЈҖв Җв ҖвўЈвЎҖв Җв Җв Җв Җв Җв Җв Җ
вўҖв ҮвЈ в Үв Җв Җв Җв ҖвЎ в һв Ғв Җв Җв ҖвЈҖв Өв –в Ҳв Ғв Җв Җв Җв Җв ҖвЎҖв Җв Җв Җв ҳвЎҶвўЈв Җв Җв ‘вўҰвЎ‘в ҰвЎҖв Җв Ғв Җв Җв івЎ„в Җв Җв Җв Җв Җв Җ
в ёвЈ°в Ғв Җв ҖвўҖвЎҙв Ӣв Җв Җв ҖвЎ в ”в Ӣв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЎҙв »вЎҖв Җв Җв Җвўұв Җв ұвЎҖв Җв Җв ҳвўҰвЎҲв ўвЎҖв Җв Җв Җв ҳвЈҶв Җв Җв Җв Җв Җ
в ҖвўҮв Җв ҖвЎ в Ӣв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЈ вЎҙв Ӣв Җвў вЈ·в ӨвЈҖвЎҖв ҖвўЈвЈҖвЎҲв ўвЎҖв Җв Җв ҷв ўвЈҲв “вў„в Җв Җв ҳвЎҖв Җв Җв Җв Җ
в Җв ёв ҖвЎ°в Ғв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҖвЈ вЎӨвўІвЎҫв ӢвЎҳв Җв ҖвўҖвў·в Ғв Җв Җвўёв үв Ғв Җв үв үв җв ўвў„в Җв Җв Ҳв ‘в ўв ӯв Ӯвў в Үв Җв Җв Җв Җ
в Җвў°вўҫвЈЎв һв үв үв үв үв үв үв үв үв Җв ҖвЎҢв Җв ҫв Ғвў в Ғв Җв ҖвЎңвЎҶв Җв ҖвўҖв Үв Җв Җв Җв Җв Җв Җв Җв Җв үв ’в ӨвЈҖвЎҖв ҖвЈҖвЈёв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвў вЎҖвўёвЎҮв Җвўёв Җв Җв ҖвЎҮвЎҮв ҖвўҖв Һв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ёв Ғв Ҳв Җв Җвўёв Җв Җв ҖвЎҮв Үв ҖвЎҢв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎ„в Җв „в Җв ҳвЎҖв Җв ҖвЎҮв Җвў°в Ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ұвЎ„в Җв Җв ҖвўЈвЎҖв Җв ёв ҖвЎҹв “вўҰв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Ҳв ўвЈҖв Җв Җв ‘в ӮвЈҖвЈғвўівЎҖвЎјв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв үв ’в ’в Ӣв Ғв Җв ҷв Ҫв Ғв Җв Җв Җв Җв Җ
  в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ

  `;

  const canvas = document.getElementById("canvasFinal");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const fontSize = 14;
  const lineHeight = 14;
  ctx.font = `${fontSize}px monospace`;

  const chars = "вўҖвЈҖвЈ¶вЈҝвЎҮвЈ§вўҝв ҝвЈӨвЈҰвЎҖвЎ„в Ҳв үв ’в ·вўҰвЈ„вЎҝвЈҫвЈҝвЈҝ";
  const particles = [];

  const lines = ramo.trim().split("\n");
  const maxLen = Math.max(...lines.map(l => l.length));

  const dibujoWidth = maxLen * fontSize * 0.55;
  const dibujoHeight = lines.length * lineHeight;

  const startX = (canvas.width - dibujoWidth) / 2;
  const startY = (canvas.height - dibujoHeight) / 2;

  lines.forEach((line, y) => {
    [...line].forEach((char, x) => {
      if (char !== " " && char !== "в Җ") {
        particles.push({
          x: startX + x * fontSize * 0.55,
          y: -Math.random() * canvas.height,
          tx: startX + x * fontSize * 0.55,
          ty: startY + y * lineHeight,
          char: chars[Math.floor(Math.random() * chars.length)],
          final: char,
          speed: 2 + Math.random() * 4,
          form: false
        });
      }
    });
  });

  setTimeout(() => {
    particles.forEach(p => p.form = true);
  }, 2500);

  setTimeout(() => {
    document.getElementById("msgFinal").style.opacity = 1;
  }, 6000);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      if (!p.form) {
        p.y += p.speed;
        if (p.y > canvas.height) p.y = -20;
        if (Math.random() < 0.1) {
          p.char = chars[Math.floor(Math.random() * chars.length)];
        }
      } else {
        p.x += (p.tx - p.x) * 0.055;
        p.y += (p.ty - p.y) * 0.055;

        if (Math.abs(p.x - p.tx) < 1 && Math.abs(p.y - p.ty) < 1) {
          p.char = p.final;
        }
      }

      ctx.fillStyle = "white";
      ctx.shadowColor = "white";
      ctx.shadowBlur = 7;
      ctx.font = `${fontSize}px monospace`;
      ctx.fillText(p.char, p.x, p.y);
    });

    requestAnimationFrame(animate);
  }

  animate();
}
  </script>
